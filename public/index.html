<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>MOBA Arena</title>
  <link rel="stylesheet" href="/css/style.css?v=5">
</head>
<body>
  <div id="lobby-screen">
    <div class="logo">MOBA ARENA</div>
    <p class="subtitle">5v5-style battles · Play in your browser</p>

    <div class="card" id="join-card">
      <label for="player-name">Your name</label>
      <input id="player-name" type="text" placeholder="Enter name" maxlength="16" value="Player">

      <label for="room-id">Room code (leave empty to create)</label>
      <input id="room-id" type="text" placeholder="e.g. A1B2C3" maxlength="6">

      <button class="btn btn-blue" id="join-btn">Join / Create Room</button>
      <p class="error-msg hidden" id="lobby-error"></p>
    </div>

    <div class="card hidden" id="room-card">
      <p class="subtitle">Share this room code with friends:</p>
      <p class="room-code" id="display-room-id">------</p>

      <div class="hero-select">
        <div class="hero-card selected" data-hero="fighter">
          <div class="hero-name">Fighter</div>
          <div class="hero-desc">Melee · High HP</div>
        </div>
        <div class="hero-card" data-hero="mage">
          <div class="hero-name">Mage</div>
          <div class="hero-desc">Ranged · Burst</div>
        </div>
      </div>

      <ul class="player-list" id="player-list"></ul>

      <button class="btn" id="ready-btn">Ready</button>
      <p class="subtitle">Need at least 2 players, all ready to start</p>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <canvas id="game-canvas"></canvas>
    <div id="world-labels"></div>

    <!-- MLBB-style HUD -->
    <div id="mlbb-hud">
      <div id="top-bar">
        <span id="kda-text">0 / 0</span>
        <span id="timer-text">0:00</span>
        <span id="gold-text">300</span>
      </div>

      <div id="minimap-wrap">
        <canvas id="minimap" width="120" height="80"></canvas>
      </div>

      <div id="kill-feed"></div>

      <div id="hud-center">
        <div id="danger-warning" class="hidden"></div>
        <div id="respawn-timer" class="hidden"><span id="respawn-text"></span></div>
      </div>

      <div id="bottom-hud">
        <div id="hero-panel">
          <div id="hero-portrait" class="fighter-portrait"></div>
          <div id="hero-bars">
            <div class="hp-bar-wrap"><div class="hp-bar-fill" id="hp-bar"></div></div>
            <span class="hp-text" id="hp-text">1200 / 1200</span>
          </div>
        </div>

        <div id="controls">
          <div id="joystick-zone">
            <div id="joystick-base"><div id="joystick-knob"></div></div>
          </div>
          <div id="skill-buttons">
            <button class="skill-btn" id="skill2-btn">S2</button>
            <button class="skill-btn" id="skill1-btn">S1</button>
            <button class="skill-btn attack" id="attack-btn">⚔</button>
          </div>
        </div>
      </div>
    </div>

    <div id="damage-flash" class="hidden"></div>
    <div id="death-overlay" class="hidden">
      <div class="death-card">
        <h2>YOU DIED</h2>
        <p id="death-killer">Killed by: Unknown</p>
        <p id="death-tip" class="death-tip"></p>
        <button class="btn btn-secondary" id="death-dismiss">OK</button>
      </div>
    </div>
    <div id="match-end-overlay" class="hidden">
      <h2 id="match-result"></h2>
      <button class="btn" id="back-lobby-btn">Back to Lobby</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/js/network.js?v=5"></script>
  <script src="/js/input.js?v=5"></script>
  <script src="/js/renderer.js?v=5"></script>
  <script src="/js/lobby.js?v=5"></script>
  <script src="/js/game.js?v=5"></script>
</body>
</html>
