<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>MOBA Arena</title>
  <link rel="stylesheet" href="/css/style.css?v=7">
</head>
<body>
  <!-- LOBBY -->
  <div id="lobby-screen">
    <div class="splash-bg"></div>
    <div class="logo">MOBA ARENA</div>
    <p class="subtitle">Classic MOBA · Play in Browser</p>

    <div class="card" id="join-card">
      <label>Player Name</label>
      <input id="player-name" type="text" placeholder="Enter name" maxlength="16" value="Player">
      <label>Room Code (empty = create)</label>
      <input id="room-id" type="text" placeholder="ABC123" maxlength="6">
      <button class="btn btn-gold" id="join-btn">ENTER</button>
      <p class="error-msg hidden" id="lobby-error"></p>
    </div>

    <div class="card hidden" id="room-card">
      <p class="room-label">ROOM CODE</p>
      <p class="room-code" id="display-room-id">------</p>

      <p class="section-title">SELECT HERO</p>
      <div class="hero-grid" id="hero-grid"></div>

      <ul class="player-list" id="player-list"></ul>
      <button class="btn btn-gold" id="ready-btn">BATTLE!</button>
      <p class="subtitle" id="lobby-hint">Bots fill empty slots</p>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="hidden">
    <canvas id="game-canvas"></canvas>
    <div id="world-labels"></div>

    <div id="mlbb-hud">
      <!-- Top score bar like MLBB -->
      <div id="score-bar">
        <div class="score-team blue-team">
          <span class="score-num" id="blue-kills">0</span>
        </div>
        <div id="timer-box">
          <span id="timer-text">00:00</span>
        </div>
        <div class="score-team red-team">
          <span class="score-num" id="red-kills">0</span>
        </div>
      </div>

      <div id="minimap-wrap">
        <canvas id="minimap" width="130" height="88"></canvas>
      </div>

      <div id="kill-feed"></div>
      <div id="kill-banner" class="hidden"></div>

      <div id="hud-center">
        <div id="danger-warning" class="hidden"></div>
        <div id="recall-bar" class="hidden"><div id="recall-fill"></div></div>
        <div id="respawn-timer" class="hidden"><span id="respawn-text"></span></div>
      </div>

      <!-- Bottom HUD -->
      <div id="bottom-hud">
        <div id="left-panel">
          <div id="hero-portrait-wrap">
            <div id="hero-portrait"></div>
            <span id="hero-level">1</span>
          </div>
          <div id="hero-bars">
            <div class="bar hp-bar-wrap"><div class="hp-bar-fill" id="hp-bar"></div></div>
            <div class="bar mana-bar-wrap"><div class="mana-bar-fill" id="mana-bar"></div></div>
            <span class="bar-text" id="hp-text">HP</span>
          </div>
          <button class="utility-btn" id="shop-btn">🛒</button>
          <button class="utility-btn" id="recall-btn">🏠</button>
        </div>

        <div id="controls">
          <div id="joystick-zone">
            <div id="joystick-base"><div id="joystick-knob"></div></div>
          </div>
          <div id="skill-buttons">
            <button class="skill-btn skill2" id="skill2-btn"><span class="skill-label">S2</span></button>
            <button class="skill-btn skill1" id="skill1-btn"><span class="skill-label">S1</span></button>
            <button class="skill-btn attack" id="attack-btn"><span class="skill-label">⚔</span></button>
          </div>
        </div>

        <div id="gold-panel">
          <span class="gold-icon">🪙</span>
          <span id="gold-text">500</span>
        </div>
      </div>
    </div>

    <!-- Shop overlay -->
    <div id="shop-overlay" class="hidden">
      <div class="shop-panel">
        <h3>ITEM SHOP</h3>
        <div id="shop-items"></div>
        <button class="btn btn-secondary" id="shop-close">Close</button>
      </div>
    </div>

    <div id="damage-flash" class="hidden"></div>
    <div id="death-overlay" class="hidden">
      <div class="death-card">
        <h2>DEFEATED</h2>
        <p id="death-killer"></p>
        <p id="death-tip" class="death-tip"></p>
        <button class="btn btn-secondary" id="death-dismiss">Continue</button>
      </div>
    </div>
    <div id="match-end-overlay" class="hidden">
      <h2 id="match-result"></h2>
      <p id="match-result-sub"></p>
      <button class="btn btn-gold" id="back-lobby-btn">Back to Lobby</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/js/heroes.js?v=7"></script>
  <script src="/js/network.js?v=7"></script>
  <script src="/js/input.js?v=7"></script>
  <script src="/js/renderer.js?v=7"></script>
  <script src="/js/lobby.js?v=7"></script>
  <script src="/js/game.js?v=7"></script>
</body>
</html>
